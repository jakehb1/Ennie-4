<!DOCTYPE html>
<html lang="en">
<head>

  <title>Ennie — Measured Energy Healing</title>
  <meta name="description" content="Measured energy healing by Charlie Goldsmith. Feel it. Measure it. Believe it." />

</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <script type="text/babel" data-type="module" src="/app.jsx"></script>
  <script type="text/babel">
    // Boot the app after the module loads
    const checkAndRender = () => {
      if (window.EnnieApp) {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(window.EnnieApp));
      } else {
        setTimeout(checkAndRender, 100);
      }
    };
    checkAndRender();
